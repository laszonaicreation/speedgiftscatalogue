<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard — Speed Gifts</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dxkcvm2yh/image/upload/v1769084529/speed_logo_5552_zuu2n7.png">
<link rel="stylesheet" href="tailwind-compiled.min.css?v=1776957074391">
<link rel="stylesheet" href="style.min.css?v=1776957074391">
<link rel="preconnect" href="https://res.cloudinary.com">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css" as="style" onload='this.onload=null,this.rel="stylesheet"'>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css" as="style" onload='this.onload=null,this.rel="stylesheet"'>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/regular.min.css" as="style" onload='this.onload=null,this.rel="stylesheet"'>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/brands.min.css" as="style" onload='this.onload=null,this.rel="stylesheet"'>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@24.5.0/build/js/intlTelInput.min.js" defer></script>
<style>
  body { margin: 0; font-family: 'Inter', 'Poppins', sans-serif; background: #f9fafb; }

  /* ── Loading Screen ─────────────────────────────────────────── */
  #admin-loading-screen {
    position: fixed; inset: 0; background: #fff; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  #admin-loading-screen .loader-logo {
    width: 120px; height: auto; opacity: 0.9;
  }
  #admin-loading-screen .loader-spinner {
    width: 36px; height: 36px; border: 3px solid #e5e7eb;
    border-top-color: #111; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #admin-loading-status {
    font-size: 11px; font-weight: 600; color: #9ca3af;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Admin Login Screen ─────────────────────────────────────── */
  #admin-login-screen {
    display: none; position: fixed; inset: 0; background: #f9fafb; z-index: 9999;
    align-items: center; justify-content: center;
  }
  .admin-login-box {
    background: #fff; border-radius: 24px; padding: 40px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08); width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .admin-login-box h1 {
    font-size: 22px; font-weight: 800; color: #111; margin: 0; letter-spacing: -0.02em;
  }
  .admin-login-box p { font-size: 12px; color: #9ca3af; margin: 0; }
  .admin-login-input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px;
    font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .admin-login-input:focus { border-color: #111; }
  .admin-login-btn {
    width: 100%; padding: 14px; background: #111; color: #fff; border: none;
    border-radius: 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
  }
  .admin-login-btn:hover { opacity: 0.85; }
  .admin-login-google {
    width: 100%; padding: 12px; background: #fff; color: #374151; border: 1.5px solid #e5e7eb;
    border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s;
    font-family: inherit;
  }
  .admin-login-google:hover { border-color: #111; }
  #admin-login-error { font-size: 11px; color: #ef4444; font-weight: 600; min-height: 16px; }

  /* ── Toast ──────────────────────────────────────────────────── */
  #toast {
    display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111; color: #fff; padding: 12px 28px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 99999; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>

<!-- Toast notification -->
<div id="toast"></div>

<!-- Loading Screen (shown while Firebase auth + data loads) -->
<div id="admin-loading-screen">
  <img class="loader-logo" src="img/speed-logo.svg" alt="Speed Gifts Admin" onerror="this.style.display='none'">
  <div class="loader-spinner"></div>
  <div id="admin-loading-status">Verifying access...</div>
</div>

<!-- Admin Login Screen (shown if not authenticated) -->
<div id="admin-login-screen">
  <div class="admin-login-box">
    <div>
      <h1>Admin Login</h1>
      <p>Speed Gifts Dashboard</p>
    </div>
    <button class="admin-login-google" onclick="window.adminSignInGoogle()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="18" height="18">
      Continue with Google
    </button>
    <div style="display:flex;align-items:center;gap:12px;opacity:0.4">
      <div style="flex:1;height:1px;background:#e5e7eb"></div>
      <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#9ca3af">or</span>
      <div style="flex:1;height:1px;background:#e5e7eb"></div>
    </div>
    <input id="admin-login-email" class="admin-login-input" type="email" placeholder="Admin Email" autocomplete="email">
    <input id="admin-login-password" class="admin-login-input" type="password" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') window.adminSignIn()">
    <div id="admin-login-error"></div>
    <button class="admin-login-btn" onclick="window.adminSignIn()">Sign In to Dashboard</button>
  </div>
</div>

<!-- Admin Panel mounts here -->
<div id="admin-panel-mount"></div>

<script type="module" src="admin-page.min.js?v=1776957074391"></script>
</body>
</html>
