<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Speed Gifts</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dxkcvm2yh/image/upload/v1769084529/speed_logo_5552_zuu2n7.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .auth-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.10);
        }
        @media (min-width: 900px) {
            .auth-wrapper {
                grid-template-columns: 1fr 1fr;
                max-width: 860px;
                border-radius: 32px;
            }
        }

        /* Left Panel (brand) */
        .auth-brand {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            background: #000;
            padding: 3rem;
            color: #fff;
        }
        @media (min-width: 900px) { .auth-brand { display: flex; } }
        .auth-brand-logo img { height: 36px; filter: brightness(0) invert(1); }
        .auth-brand-copy h2 {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }
        .auth-brand-copy p { font-size: 0.85rem; color: #999; line-height: 1.7; }
        .auth-brand-bottom {
            font-size: 0.7rem;
            color: #444;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Right Panel (form) */
        .auth-form-panel { padding: 2.5rem 2rem; }
        @media (min-width: 900px) { .auth-form-panel { padding: 3rem 2.5rem; } }

        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #9ca3af;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }
        .auth-back:hover { color: #111; }

        .auth-title { font-size: 1.6rem; font-weight: 800; color: #111; letter-spacing: -0.03em; margin-bottom: 0.4rem; }
        .auth-subtitle { font-size: 0.8rem; color: #9ca3af; font-weight: 400; margin-bottom: 2rem; }

        /* Google Button */
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            color: #111;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 1.5rem;
        }
        .btn-google:hover { background: #f9fafb; border-color: #d1d5db; }
        .btn-google img { width: 18px; height: 18px; }

        /* Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            color: #e5e7eb;
            font-size: 0.75rem;
            color: #9ca3af;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        /* Inputs */
        .auth-field { margin-bottom: 1rem; }
        .auth-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }
        .auth-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            color: #111;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-input:focus { border-color: #111; }
        .auth-input::placeholder { color: #d1d5db; }

        /* Forgot */
        .auth-forgot {
            display: block;
            text-align: right;
            font-size: 0.72rem;
            font-weight: 600;
            color: #9ca3af;
            text-decoration: none;
            margin-top: -0.5rem;
            margin-bottom: 1.25rem;
            transition: color 0.2s;
        }
        .auth-forgot:hover { color: #111; }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: #111;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            padding: 0.875rem 1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.2s, opacity 0.2s;
            margin-bottom: 1.25rem;
        }
        .btn-submit:hover { background: #222; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toggle */
        .auth-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .auth-toggle button {
            background: none;
            border: none;
            color: #111;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Toast */
        #sg-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        #sg-toast.show { transform: translateX(-50%) translateY(0); }

        .hidden { display: none !important; }

        /* Password wrapper */
        .pw-wrap { position: relative; }
        .pw-toggle {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 0.875rem;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <!-- Left Brand Panel -->
    <div class="auth-brand">
        <div class="auth-brand-logo">
            <img src="img/speed-logo.svg" alt="Speed Gifts">
        </div>
        <div class="auth-brand-copy">
            <h2>Welcome to Speed Gifts</h2>
            <p>Abu Dhabi's premier destination for personalized gifts, custom engraving, and unique creations for every occasion.</p>
        </div>
        <div class="auth-brand-bottom">WTC Mall · Abu Dhabi · UAE</div>
    </div>

    <!-- Right Form Panel -->
    <div class="auth-form-panel">
        <a href="javascript:history.back()" class="auth-back">
            <i class="fa-solid fa-arrow-left text-[10px]"></i> Back
        </a>

        <h1 class="auth-title" id="auth-title">Welcome Back</h1>
        <p class="auth-subtitle" id="auth-subtitle">Sign in to your Speed Gifts account</p>

        <!-- Google Sign In -->
        <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
            <img src="https://www.google.com/favicon.ico" alt="Google">
            Continue with Google
        </button>

        <div class="auth-divider">or</div>

        <!-- Form -->
        <form id="auth-form" onsubmit="handleSubmit(event)" novalidate>
            <!-- Name (register only) -->
            <div class="auth-field hidden" id="field-name">
                <label for="auth-name">Full Name</label>
                <input type="text" id="auth-name" class="auth-input" placeholder="Your full name" autocomplete="name">
            </div>

            <div class="auth-field">
                <label for="auth-email">Email Address</label>
                <input type="email" id="auth-email" class="auth-input" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="auth-field">
                <label for="auth-password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="auth-password" class="auth-input" placeholder="••••••••" autocomplete="current-password" required style="padding-right:2.5rem;">
                    <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-toggle-btn"><i class="fa-regular fa-eye" id="pw-icon"></i></button>
                </div>
            </div>

            <a href="#" class="auth-forgot" id="auth-forgot" onclick="handleForgot(event)">Forgot password?</a>

            <button type="submit" class="btn-submit" id="btn-submit">
                <span id="btn-text">Sign In</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="auth-toggle">
            <span id="toggle-label">Don't have an account?</span>
            <button onclick="toggleMode()" id="toggle-btn">Sign Up</button>
        </div>
    </div>
</div>

<div id="sg-toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail,
        onAuthStateChanged,
        updateProfile
    } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAggNtKyGHlnjhx8vwbZFL5aM98awBt6Sw",
        authDomain: "speed-catalogue.firebaseapp.com",
        projectId: "speed-catalogue",
        storageBucket: "speed-catalogue.firebasestorage.app",
        messagingSenderId: "84589409246",
        appId: "1:84589409246:web:124e25b09ba54dc9e3e34f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Redirect destination: where user came from (or home)
    const redirectTo = sessionStorage.getItem('sg_login_redirect') || '/';

    // If already logged in → redirect
    onAuthStateChanged(auth, (user) => {
        if (user && !user.isAnonymous) {
            sessionStorage.removeItem('sg_login_redirect');
            window.location.href = redirectTo;
        }
    });

    let mode = 'login'; // 'login' | 'register'

    window.toggleMode = () => {
        mode = mode === 'login' ? 'register' : 'login';
        const isReg = mode === 'register';

        document.getElementById('auth-title').textContent = isReg ? 'Create Account' : 'Welcome Back';
        document.getElementById('auth-subtitle').textContent = isReg ? 'Join Speed Gifts today' : 'Sign in to your Speed Gifts account';
        document.getElementById('field-name').classList.toggle('hidden', !isReg);
        document.getElementById('auth-forgot').classList.toggle('hidden', isReg);
        document.getElementById('btn-text').textContent = isReg ? 'Create Account' : 'Sign In';
        document.getElementById('toggle-label').textContent = isReg ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('toggle-btn').textContent = isReg ? 'Sign In' : 'Sign Up';
        document.getElementById('auth-password').autocomplete = isReg ? 'new-password' : 'current-password';
        document.getElementById('auth-form').reset();
    };

    window.handleSubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        const name = document.getElementById('auth-name').value.trim();
        const btn = document.getElementById('btn-submit');

        if (!email || !password) return showToast('Please fill all fields');

        btn.disabled = true;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Please wait...';

        try {
            if (mode === 'login') {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Welcome back!');
            } else {
                if (!name) { btn.disabled = false; btn.innerHTML = orig; return showToast('Please enter your name'); }
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                showToast('Account created!');
            }
            sessionStorage.removeItem('sg_login_redirect');
            setTimeout(() => { window.location.href = redirectTo; }, 800);
        } catch (err) {
            const msg = err.message?.replace('Firebase:', '').trim() || 'Authentication failed';
            showToast(msg);
            btn.disabled = false;
            btn.innerHTML = orig;
        }
    };

    window.signInWithGoogle = async () => {
        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            showToast('Signed in with Google!');
            sessionStorage.removeItem('sg_login_redirect');
            setTimeout(() => { window.location.href = redirectTo; }, 800);
        } catch {
            showToast('Google sign-in cancelled or failed');
        }
    };

    window.handleForgot = async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value.trim();
        if (!email) return showToast('Enter your email first');
        try {
            await sendPasswordResetEmail(auth, email);
            showToast('Password reset email sent!');
        } catch (err) {
            showToast(err.message?.replace('Firebase:', '').trim() || 'Error');
        }
    };

    window.togglePw = () => {
        const input = document.getElementById('auth-password');
        const icon = document.getElementById('pw-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye';
        }
    };

    function showToast(msg) {
        const t = document.getElementById('sg-toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    window.showToast = showToast;
</script>
</body>
</html>
