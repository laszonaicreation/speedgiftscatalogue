<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favourites – Speed Gifts</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png"
        href="https://res.cloudinary.com/dxkcvm2yh/image/upload/v1769084529/speed_logo_5552_zuu2n7.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind + Site CSS (same as other pages) -->
    <link rel="stylesheet" href="tailwind-compiled.min.css?v=1776673280521">
    <link rel="stylesheet" href="style.min.css?v=1776673280521">
    <link rel="stylesheet" href="cart.min.css?v=1776673280521">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/regular.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/brands.min.css">

    <!-- Cloudinary -->
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f7f7f7;
            color: #111;
            -webkit-font-smoothing: antialiased;
        }

        /* PAGE */
        .sg-page {
            max-width: 640px;
            margin: 0 auto;
            padding: 1.5rem 1rem 8rem;
        }

        /* HEADER */
        .sg-header {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sg-header-left {
            text-align: left;
            flex: 1;
        }

        .sg-header-left h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 0.15rem;
            letter-spacing: -0.02em;
        }

        .sg-header-count {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6b7280;
            margin: 0;
        }

        /* WhatsApp All Button */
        .sg-wa-all-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 100px;
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .sg-wa-all-btn:hover { background: #333; }
        .sg-wa-all-btn i { font-size: 1rem; }

        /* LOGIN PROMPT */
        .sg-login-prompt {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #e0f2fe;
            border: 1px solid #bae6fd;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            color: #0369a1;
        }
        .sg-login-prompt-icon {
            font-size: 1.5rem;
            color: #0284c7;
        }
        .sg-login-prompt-text {
            flex: 1;
        }
        .sg-login-prompt-text h3 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            color: #0c4a6e;
        }
        .sg-login-prompt-text p {
            font-size: 0.7rem;
            color: #0369a1;
            line-height: 1.4;
        }
        .sg-login-prompt-btn {
            background: #0284c7;
            color: #fff;
            border: none;
            border-radius: 100px;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .sg-login-prompt-btn:hover { background: #0369a1; }

        /* ITEMS LIST */
        .sg-items-list { display: flex; flex-direction: column; gap: 0.6rem; }

        /* FAV ITEM */
        .fav-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 18px;
            transition: background 0.15s;
            align-items: center;
        }
        .fav-item:hover { background: #fafafa; }

        .fav-img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: #f4f4f4;
            cursor: pointer;
        }
        .fav-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.25s; }
        .fav-img:hover img { transform: scale(1.06); }

        .fav-info { flex: 1; min-width: 0; }

        .fav-name {
            font-size: 0.875rem;
            font-weight: 400;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            cursor: pointer;
            margin-bottom: 0.1rem;
        }
        .fav-name:hover { color: #555; }

        .fav-price { font-size: 0.7rem; color: #9ca3af; font-weight: 600; margin-bottom: 0.35rem; }
        .fav-price strong { color: #111; font-weight: 700; }

        .fav-actions { display: flex; align-items: center; gap: 0.4rem; }

        .fav-cart-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.35rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: background 0.15s;
        }
        .fav-cart-btn:hover { background: #333; }
        .fav-cart-btn i { font-size: 0.875rem; }

        .fav-view-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #f4f4f4;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .fav-view-btn:hover { background: #e5e7eb; }

        .fav-remove {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            background: #fff0f0;
            color: #ef4444;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .fav-remove:hover { background: #ef4444; color: #fff; }

        /* SKELETON */
        .fav-skel {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 20px;
            padding: 14px;
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .fav-skel-img { width: 76px; height: 76px; border-radius: 16px; flex-shrink: 0; }
        .fav-skel-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .fav-skel-line { height: 10px; border-radius: 5px; }

        .sg-skeleton {
            background: linear-gradient(90deg, #f4f4f4 25%, #ececec 50%, #f4f4f4 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0 }
            100% { background-position: -200% 0 }
        }

        /* EMPTY */
        .sg-empty {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: #fff;
            border-radius: 24px;
            border: 1px solid #f0f0f0;
        }
        .sg-empty i { font-size: 2rem; color: #e5e7eb; display: block; margin-bottom: 0.875rem; }
        .sg-empty h2 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.35rem; }
        .sg-empty p { font-size: 0.73rem; color: #9ca3af; margin-bottom: 1rem; line-height: 1.7; }

        .sg-empty-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            background: #111;
            color: #fff;
            border-radius: 100px;
            padding: 0.6rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
        }
        .sg-empty-btn i { display: none; }
        .sg-empty-btn:hover { background: #333; }

        /* TOAST */
        #sg-toast {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 9999;
            transition: all 0.3s ease;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
        }
        #sg-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* LOADING */
        #sg-loading {
            position: fixed;
            inset: 0;
            background: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .sg-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e5e7eb;
            border-top-color: #111;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Transition for removing items */
        .fav-item.removing {
            opacity: 0;
            transform: translateX(20px) scale(0.96);
            transition: all 0.25s ease;
        }
    </style>
</head>

<body>

    <div id="sg-loading">
        <div class="sg-spinner"></div>
    </div>

    <!-- Shared Shell (same top nav + mobile bottom nav as all other pages) -->
    <div id="shared-shell-root"></div>

    <main class="sg-page" id="sg-page" style="display:none;">

        <div class="sg-header">
            <div class="sg-header-left">
                <h1>My Favourites</h1>
                <p class="sg-header-count" id="fav-count-text">Loading...</p>
            </div>
            <a href="#" id="cart-all-btn" class="sg-wa-all-btn" style="display:none;" onclick="addAllToCart(event)">
                <i class="fa-solid fa-cart-shopping"></i> Add All to Cart
            </a>
        </div>

        <div id="sg-login-prompt" class="sg-login-prompt" style="display:none;">
            <div class="sg-login-prompt-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <div class="sg-login-prompt-text">
                <h3>Save your favourites permanently</h3>
                <p>Sign in to sync your saved items across all your devices so you never lose them.</p>
            </div>
            <button onclick="window.openAuthModal && window.openAuthModal()" class="sg-login-prompt-btn">Login Now</button>
        </div>

        <div id="sg-list-container"></div>

    </main>

    <div id="sg-toast"></div>

    <script type="module" src="favourites-page.min.js?v=1776673280521"></script>
</body>

</html>
